  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      font-family:'Segoe UI','Tahoma',system-ui,-apple-system,sans-serif;
      background:#f1f5f9;color:#1e293b;
      height:100vh;display:flex;flex-direction:column;overflow:hidden;
    }

    /* ── HIDE MAP ATTRIBUTION ── */
    .leaflet-control-attribution{display:none!important}

    .topbar{
      background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);
      border-bottom:1px solid #e2e8f0;padding:7px 14px;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;z-index:10;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
    }
    .topbar h1{
      font-size:0.8rem;font-weight:600;
      background:linear-gradient(135deg,#2563eb,#7aa9ff);
      background-clip:text;-webkit-background-clip:text;color:transparent;
      display:flex;align-items:center;gap:5px;
    }
    .total-pill{
      background:#f8fafc;border:1px solid #e2e8f0;
      border-radius:40px;padding:3px 10px;
      font-size:0.65rem;font-weight:500;color:#475569;
    }
    .total-pill b{color:#2563eb;font-size:0.85rem;margin-left:3px}

    .main-layout{display:flex;flex:1;overflow:hidden;position:relative}

    /* ── SIDEBAR – narrower ── */
    .sidebar{
      width:52px;
      background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);
      border-left:1px solid rgba(226,232,240,0.9);
      display:flex;flex-direction:column;
      overflow:hidden;flex-shrink:0;z-index:20;
      will-change:transform; /* GPU layer hint */
      box-shadow:-1px 0 6px rgba(0,0,0,.06);
    }
    .patrol-list{
      flex:1;overflow-y:auto;
      padding:10px 6px;
      display:flex;flex-direction:column;align-items:center;gap:11px;
      scrollbar-width:thin;scrollbar-color:#cbd5e1 #f1f5f9;
    }
    .patrol-list::-webkit-scrollbar{width:2px}
    .patrol-list::-webkit-scrollbar-track{background:#f1f5f9}
    .patrol-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}

    .patrol-circle-item{
      display:flex;flex-direction:column;align-items:center;
      cursor:pointer;transition:transform .18s ease;width:100%;
    }

    /* ── CIRCLES – smaller ── */
    .circle{
      width:38px;height:38px;border-radius:50%;
      background:#ffffff;display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:0.62rem;border:2px solid;
      transition:background .18s,box-shadow .18s;
      box-shadow:0 2px 6px rgba(0,0,0,.12);
      font-family:monospace;
      will-change:transform;
      color:#1e293b;
    }
    .circle span{font-size:0.68rem;font-weight:800}
    .patrol-circle-item:hover .circle{transform:scale(1.06);background:#f1f5f9}
    .patrol-circle-item.selected .circle{
      border-width:3px;
      box-shadow:0 0 0 2px rgba(96,165,250,.5);
      transform:scale(1.03);
    }

    /* ── DETAIL SHEET ── */
    .detail-sheet{
      position:absolute;bottom:0;
      left:52px;right:0;
      background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);
      border-top:1px solid #e2e8f0;border-radius:20px 20px 0 0;
      padding:11px 14px;
      transform:translateY(100%);
      transition:transform .22s cubic-bezier(.2,.9,.4,1.1);
      z-index:30;max-height:200px;overflow-y:auto;
      box-shadow:0 -4px 20px rgba(0,0,0,.12);
    }
    .detail-sheet.visible{transform:translateY(0)}
    .detail-header{
      display:flex;justify-content:space-between;align-items:center;
      border-bottom:1px solid #e2e8f0;padding-bottom:5px;margin-bottom:7px;
    }
    .detail-title{font-size:0.72rem;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:5px}
    .close-detail{
      background:#f1f5f9;border:none;color:#64748b;
      font-size:1rem;cursor:pointer;border-radius:30px;
      width:24px;height:24px;display:flex;align-items:center;justify-content:center;
      transition:background .15s;
    }
    .close-detail:hover{background:#e2e8f0}
    .detail-row{
      display:flex;justify-content:space-between;
      font-size:0.67rem;padding:4px 0;border-bottom:1px solid #f1f5f9;
    }
    .detail-row span:last-child{color:#1e293b;font-weight:500;text-align:left}
    .bridge-chip{
      background:#f8fafc;border-radius:30px;
      padding:2px 8px;font-size:0.62rem;
      display:inline-block;margin:2px 3px 2px 0;
      border:1px solid #e2e8f0;color:#475569;
    }
    .polygon-mini{font-size:0.57rem;color:#64748b;margin-top:4px}

    #map{flex:1;background:#03060e;z-index:1}

    .leaflet-popup-content{
      direction:rtl;font-family:'Segoe UI',sans-serif;font-size:11px;
    }
    .custom-legend{
      background:#ffffffee;backdrop-filter:blur(8px);
      border-radius:12px;padding:4px 9px;
      font-size:0.57rem;border:1px solid #e2e8f0;
      box-shadow:0 2px 8px rgba(0,0,0,.1);
      color:#475569;
    }

    @media(max-width:560px){
      .sidebar{width:46px}
      .circle{width:33px;height:33px;font-size:0.55rem}
      .detail-sheet{left:46px;padding:9px 11px;max-height:180px}
    }
  </style>
</head>

  /* ── Build layers ── */
  const layersMap=new Map();

  patrolsData.forEach(p=>{
    const poly=L.polygon(p.polygon,{
      color:p.color,weight:2.5,opacity:.85,
      fillColor:p.color,fillOpacity:.18,
      dashArray:'6,5',smoothFactor:1.5   // higher = fewer points rendered
    }).addTo(map).bindPopup(
      `<div dir="rtl" style="background:#fff;padding:6px 9px;border-radius:9px;color:#1e293b;border:1px solid #e2e8f0;min-width:110px;box-shadow:0 2px 8px rgba(0,0,0,.08);">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;"><svg width="11" height="11" viewBox="0 0 13 13"><polygon points="1,1 12,1 12,12 1,12" fill="${p.color}33" stroke="${p.color}" stroke-width="1.5" stroke-dasharray="3,2"/></svg><b style="color:${p.color};font-size:11px;">${p.patrolNumber}</b></div>
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#64748b;"><svg width="8" height="10" viewBox="0 0 34 44"><path d="M17 2C9.5 2 3.5 8 3.5 16c0 10 13.5 26 13.5 26s13.5-16 13.5-26C30.5 8 24.5 2 17 2z" fill="#94a3b8"/></svg>${p.zoneName}</div>
      </div>`
    );

    const bridges=p.bridges.map(b=>
      L.marker([b.location.lat,b.location.lng],{icon:bridgeIcon(p.color),riseOnHover:true})
       .addTo(map)
       .bindPopup(`<div dir="rtl" style="background:#fff;border-radius:9px;padding:6px 9px;color:#1e293b;border:1px solid #e2e8f0;min-width:100px;box-shadow:0 2px 8px rgba(0,0,0,.08);">
         <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;"><svg width="14" height="10" viewBox="0 0 18 14"><rect x="0" y="8.5" width="18" height="2.4" rx="0.8" fill="${p.color}"/><rect x="2.5" y="1.5" width="2.2" height="9" rx="0.6" fill="${p.color}"/><rect x="13.3" y="1.5" width="2.2" height="9" rx="0.6" fill="${p.color}"/><path d="M3.6 1.5 Q9 6.2 14.4 1.5" fill="none" stroke="${p.color}" stroke-width="1.5" stroke-linecap="round"/></svg><strong style="font-size:11px;">${b.name}</strong></div>
         <div style="font-size:10px;color:#64748b;">دورية ${p.patrolNumber}</div>
       </div>`)
    );

    const marker=L.marker([p.location.lat,p.location.lng],{icon:patrolIcon(p),zIndexOffset:500})
      .addTo(map)
      .bindPopup(`<div dir="rtl" style="background:#fff;border-radius:10px;padding:7px 10px;color:#1e293b;border:1px solid #e2e8f0;min-width:120px;box-shadow:0 2px 10px rgba(0,0,0,.1);">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px;"><svg width="11" height="14" viewBox="0 0 34 44"><path d="M17 2C9.5 2 3.5 8 3.5 16c0 10 13.5 26 13.5 26s13.5-16 13.5-26C30.5 8 24.5 2 17 2z" fill="${p.color}" stroke="#fff" stroke-width="2"/><circle cx="17" cy="16" r="7" fill="rgba(255,255,255,0.25)"/></svg><b style="color:${p.color};font-size:12px;">دورية ${p.patrolNumber}</b></div>
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#64748b;margin-bottom:3px;"><svg width="8" height="10" viewBox="0 0 34 44"><path d="M17 2C9.5 2 3.5 8 3.5 16c0 10 13.5 26 13.5 26s13.5-16 13.5-26C30.5 8 24.5 2 17 2z" fill="#94a3b8"/></svg>${p.zoneName}</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#64748b;"><svg width="12" height="9" viewBox="0 0 18 14"><rect x="0" y="8.5" width="18" height="2.4" rx="0.8" fill="#94a3b8"/><rect x="2.5" y="1.5" width="2.2" height="9" rx="0.6" fill="#94a3b8"/><rect x="13.3" y="1.5" width="2.2" height="9" rx="0.6" fill="#94a3b8"/><path d="M3.6 1.5 Q9 6.2 14.4 1.5" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></svg>${p.bridges.length} جسر مسموح</div>
      </div>`);

    marker.on('click',()=>selectPatrol(p.patrolNumber));

    layersMap.set(p.patrolNumber,{marker,polygonLayer:poly,bridgeMarkers:bridges,data:p});
  });

  /* ── UI refs ── */
  const circleContainer=document.getElementById('patrol-circle-list');
  const detailSheet=document.getElementById('detailSheet');
  const detailTitleEl=document.getElementById('detailTitle');
  const detailContentEl=document.getElementById('detailContent');
  document.getElementById('closeDetailBtn').addEventListener('click',()=>detailSheet.classList.remove('visible'),{passive:true});

  let currentId=null;

  /* ── Select patrol ── */
  function selectPatrol(id){
    const target=layersMap.get(id);
    if(!target) return;
    const p=target.data;
    currentId=id;

    layersMap.forEach((l,lid)=>{
      if(lid===id){
        l.polygonLayer.setStyle({weight:4,opacity:1,fillOpacity:.32,color:p.color,dashArray:null});
        l.polygonLayer.bringToFront();
        l.bridgeMarkers.forEach(m=>{m.setIcon(bridgeIcon(p.color));m.setZIndexOffset(700)});
        l.marker.setZIndexOffset(1000);
        l.marker.openPopup();
      }else{
        l.polygonLayer.setStyle({weight:1.5,opacity:.4,fillOpacity:.06,color:'#9ca3af',dashArray:'4,6'});
        l.bridgeMarkers.forEach(m=>{m.setIcon(bridgeIcon('#6b7280'));m.setZIndexOffset(100);m.closePopup()});
        l.marker.setZIndexOffset(200);l.marker.closePopup();
      }
    });

    map.flyToBounds(target.polygonLayer.getBounds(),{padding:[50,50],duration:.9,maxZoom:15});

    /* Detail panel */
    detailTitleEl.innerHTML=`<svg width="11" height="14" viewBox="0 0 34 44" style="flex-shrink:0;"><path d="M17 2C9.5 2 3.5 8 3.5 16c0 10 13.5 26 13.5 26s13.5-16 13.5-26C30.5 8 24.5 2 17 2z" fill="${p.color}" stroke="#fff" stroke-width="2"/></svg><span style="color:${p.color};font-weight:700;">${p.patrolNumber}</span><span style="color:#cbd5e1;margin:0 3px;">·</span><span style="color:#475569;">${p.zoneName}</span>`;
    detailContentEl.innerHTML=`
      <div class="detail-row"><span style="display:flex;align-items:center;gap:4px;"><svg width="8" height="10" viewBox="0 0 34 44"><path d="M17 2C9.5 2 3.5 8 3.5 16c0 10 13.5 26 13.5 26s13.5-16 13.5-26C30.5 8 24.5 2 17 2z" fill="#94a3b8"/></svg>GPS</span><span>${p.location.lat.toFixed(5)} , ${p.location.lng.toFixed(5)}</span></div>
      <div class="detail-row"><span style="display:flex;align-items:center;gap:4px;"><svg width="12" height="9" viewBox="0 0 18 14"><rect x="0" y="8.5" width="18" height="2.4" rx="0.8" fill="#94a3b8"/><rect x="2.5" y="1.5" width="2.2" height="9" rx="0.6" fill="#94a3b8"/><rect x="13.3" y="1.5" width="2.2" height="9" rx="0.6" fill="#94a3b8"/><path d="M3.6 1.5 Q9 6.2 14.4 1.5" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/></svg>الجسور (${p.bridges.length})</span><span>${p.bridges.map(b=>b.name).join(' • ')}</span></div>
      <div style="margin-top:5px;">${p.bridges.map(b=>`<span class="bridge-chip" style="display:inline-flex;align-items:center;gap:3px;"><svg width="11" height="8" viewBox="0 0 18 14"><rect x="0" y="8.5" width="18" height="2.4" rx="0.8" fill="${p.color}"/><rect x="2.5" y="1.5" width="2.2" height="9" rx="0.6" fill="${p.color}"/><rect x="13.3" y="1.5" width="2.2" height="9" rx="0.6" fill="${p.color}"/><path d="M3.6 1.5 Q9 6.2 14.4 1.5" fill="none" stroke="${p.color}" stroke-width="1.5" stroke-linecap="round"/></svg>${b.name}</span>`).join('')}</div>
      <div class="polygon-mini" style="margin-top:5px;display:flex;align-items:center;gap:4px;"><svg width="10" height="10" viewBox="0 0 13 13"><polygon points="1,1 12,1 12,12 1,12" fill="rgba(148,163,184,0.2)" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3,2"/></svg>منطقة الاختصاص محددة بالمضلع</div>
    `;
    detailSheet.classList.add('visible');
    renderCircleList();
  }

  /* ── Show all ── */
  function showAll(){
    const bounds=L.latLngBounds();
    layersMap.forEach(l=>{
      const c=l.data.color;
      l.polygonLayer.setStyle({weight:2,opacity:.7,fillOpacity:.14,color:c,dashArray:'5,5'});
      l.bridgeMarkers.forEach(m=>{m.setIcon(bridgeIcon(c));m.setZIndexOffset(300)});
      l.marker.setZIndexOffset(300);l.marker.closePopup();
      bounds.extend(l.polygonLayer.getBounds());
    });
    detailSheet.classList.remove('visible');
    currentId=null;
    renderCircleList();
    map.flyToBounds(bounds,{padding:[25,25],duration:.7,maxZoom:13});
  }

  /* ── Sidebar circles ── */
  function renderCircleList(){
    /* Use DocumentFragment for a single DOM insertion */
    const frag=document.createDocumentFragment();

    const allItem=document.createElement('div');
    allItem.className='patrol-circle-item';
    allItem.innerHTML=`<div class="circle" style="border-color:#94a3b8;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.2"/><rect x="14" y="3" width="7" height="7" rx="1.2"/><rect x="3" y="14" width="7" height="7" rx="1.2"/><rect x="14" y="14" width="7" height="7" rx="1.2"/></svg></div>`;
    allItem.addEventListener('click',e=>{e.stopPropagation();showAll()},{passive:true});
    frag.appendChild(allItem);

    patrolsData.forEach(p=>{
      const item=document.createElement('div');
      item.className=`patrol-circle-item${currentId===p.patrolNumber?' selected':''}`;
      item.innerHTML=`<div class="circle" style="border-color:${p.color}"><span>${p.patrolNumber}</span></div>`;
      item.addEventListener('click',e=>{e.stopPropagation();selectPatrol(p.patrolNumber)},{passive:true});
      frag.appendChild(item);
    });

    circleContainer.innerHTML='';
    circleContainer.appendChild(frag);
  }

  renderCircleList();

  /* Initial fit */
  const initBounds=L.latLngBounds();
  layersMap.forEach(l=>initBounds.extend(l.polygonLayer.getBounds()));
  map.fitBounds(initBounds,{padding:[18,18]});
});
</script>
</body>
</html>
